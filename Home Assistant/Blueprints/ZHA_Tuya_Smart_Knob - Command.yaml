blueprint:
  name: ZHA - Moes Smart Knob for lights - Command Mode
  description: "Control lights with a Moes Smart Knob.

    The knob functions in 2 modes: Command and Event/Scene. To switch between them, triple click the center button

    Command mode:
    1. Single Press
    2. Rotate Left/Right to dim
    3. Rotate Left/Right while pressing the center button to dim a different light(if prefered)

    Event/Scene mode:
    1. Single Press
    2. Double Press
    3. Long Press (Hold for about 4 seconds then release)

    Original blueprints by seamus65 (https://gist.github.com/seamus65/939a147634942dd885c8704334627f93).
    and
    JoryHogeveen (https://github.com/JoryHogeveen/HomeAssistantConfig/blob/c97016bee95cb13a7437087b994665fe609873cf/blueprints/automation/tuya/tuya-TS004F-knob.yaml)

    Improved by GonzaloAlbito (https://gist.github.com/gonzaloalbito/3dc06702e941e08298ea9bfade731731).

    Rewrote by Dreamscent(0x4a)

    As a starting value, brightness step(%) at around 20% is good

    Version 2025-03-17."
  domain: automation
  input:
    remote:
      name: Remote
      description: Moes Knob to use
      selector:
        device:
          filter:
            - integration: zha
              manufacturer: _TZ3000_qja6nq5z
              model: TS004F
    light:
      name: Light(s)
      description: The light(s) to control
      selector:
        target:
          entity:
            - domain:
                - light
    step_percent:
      name: Light step
      description: Light pecent change for each knob step
      selector:
        number:
          mode: slider
          min: 0.0
          max: 100.0
          unit_of_measurement: "%"
          step: 1.0
      default: 10
    press_light:
      name: Pressed light(s)
      description: The light(s) to control when pressed
      selector:
        target:
          entity:
            - domain:
                - light
    press_step_percent:
      name: Pressed light step
      description: Light pecent change for each knob step when pressed
      selector:
        number:
          mode: slider
          min: 0.0
          max: 100.0
          unit_of_measurement: "%"
          step: 1.0
      default: 10
    single_press:
      name: Single press
      description: Action to run on single press
      default: []
      selector:
        action: {}
  source_url: https://github.com/Dreamscent/HomeIsWhereTheSmartIs/blob/main/Home%20Assistant/Blueprints/ZHA_Tuya_Smart_Knob%20-%20Command.yaml
mode: queued
max_exceeded: silent
triggers:
  - trigger: event
    event_type: zha_event
    event_data:
      device_id: !input remote
action:
  - variables:
      # same for both
      command: "{{ trigger.event.data.command }}"
      cluster_id: "{{ trigger.event.data.cluster_id }}"
      endpoint_id: "{{ trigger.event.data.endpoint_id }}"
      mode: "{% if command != 'toggle' %} {{ trigger.event.data.args[0] }} {% endif %}"
      # Ensure steps is a valid number or default to 1
      steps: "{% if command != 'toggle' and trigger.event.data.args[1] is defined %} {{ (trigger.event.data.args[1] / 12.5) | int }} {% else %} 1 {% endif %}"
      step_percent: !input step_percent
      press_step_percent: !input press_step_percent
  - choose:
      - conditions:
          - "{{ cluster_id == 6 }}"
          - "{{ endpoint_id == 1 }}"
          - "{{ command == 'toggle' }}"
        sequence: !input single_press
      - conditions:
          - "{{ cluster_id == 8 }}"
          - "{{ endpoint_id == 1 }}"
          - "{{ command == 'step' }}"
          - "{{ mode == 'StepMode.Up' }}"
        sequence:
          - repeat:
              while:
                - condition: template
                  value_template: "{{ repeat.index < 2 }}"
              sequence:
                - action: light.turn_on
                  target: !input light
                  data_template:
                    brightness_step_pct: "{{ step_percent * steps | float }}"
                    #transition: 0.5
      - conditions:
          - "{{ cluster_id == 8 }}"
          - "{{ endpoint_id == 1 }}"
          - "{{ command == 'step' }}"
          - "{{ mode == 'StepMode.Down' }}"
        sequence:
          - repeat:
              while:
                - condition: template
                  value_template: "{{ repeat.index < 2 }}"
              sequence:
                - action: light.turn_on
                  target: !input light
                  data_template:
                    brightness_step_pct: "{{ - (press_step_percent * steps) | float }}"
      - conditions:
          - "{{ cluster_id == 768 }}"
          - "{{ endpoint_id == 1 }}"
          - "{{ command == 'step_color_temp' }}"
          - "{{ mode == 'StepMode.Up' }}"
        sequence:
          - repeat:
              while:
                - condition: template
                  value_template: "{{ repeat.index < 2 }}"
              sequence:
                - action: light.turn_on
                  target: !input press_light
                  data_template:
                    brightness_step_pct: "{{ step_percent * steps | float }}"
      - conditions:
          - "{{ cluster_id == 768 }}"
          - "{{ endpoint_id == 1 }}"
          - "{{ command == 'step_color_temp' }}"
          - "{{ mode == 'StepMode.Down' }}"
        sequence:
          - repeat:
              while:
                - condition: template
                  value_template: "{{ repeat.index < 2 }}"
              sequence:
                - action: light.turn_on
                  target: !input press_light
                  data_template:
                    brightness_step_pct: "{{ - (press_step_percent * steps) | float }}"
                    #transition: 0.5
