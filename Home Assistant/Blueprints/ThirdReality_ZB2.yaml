blueprint:
  name: Z2M - 3 Button Remote (Third Reality ZB2 Smart Button)
  description: Handle single/double/hold/release for 3-button Z2M remotes
  domain: automation

  input:
    remote:
      name: Remote
      selector:
        device:
          integration: mqtt

    button_1_single:
      name: Button 1 - Single
      default: []
      selector: { action: {} }

    button_1_double:
      name: Button 1 - Double
      default: []
      selector: { action: {} }

    button_1_hold:
      name: Button 1 - Hold
      default: []
      selector: { action: {} }

    button_1_release:
      name: Button 1 - Release
      default: []
      selector: { action: {} }

    button_2_single:
      name: Button 2 - Single
      default: []
      selector: { action: {} }

    button_2_double:
      name: Button 2 - Double
      default: []
      selector: { action: {} }

    button_2_hold:
      name: Button 2 - Hold
      default: []
      selector: { action: {} }

    button_2_release:
      name: Button 2 - Release
      default: []
      selector: { action: {} }

    button_3_single:
      name: Button 3 - Single
      default: []
      selector: { action: {} }

    button_3_double:
      name: Button 3 - Double
      default: []
      selector: { action: {} }

    button_3_hold:
      name: Button 3 - Hold
      default: []
      selector: { action: {} }

    button_3_release:
      name: Button 3 - Release
      default: []
      selector: { action: {} }

trigger:
  - platform: state
    entity_id: !input remote

action:
  - variables:
      action: "{{ trigger.to_state.state }}"

  - choose:

      # BUTTON 1
      - conditions: "{{ action == 'single_1' }}"
        sequence: !input button_1_single
      - conditions: "{{ action == 'double_1' }}"
        sequence: !input button_1_double
      - conditions: "{{ action == 'hold_1' }}"
        sequence: !input button_1_hold
      - conditions: "{{ action == 'release_1' }}"
        sequence: !input button_1_release

      # BUTTON 2
      - conditions: "{{ action == 'single_2' }}"
        sequence: !input button_2_single
      - conditions: "{{ action == 'double_2' }}"
        sequence: !input button_2_double
      - conditions: "{{ action == 'hold_2' }}"
        sequence: !input button_2_hold
      - conditions: "{{ action == 'release_2' }}"
        sequence: !input button_2_release

      # BUTTON 3
      - conditions: "{{ action == 'single_3' }}"
        sequence: !input button_3_single
      - conditions: "{{ action == 'double_3' }}"
        sequence: !input button_3_double
      - conditions: "{{ action == 'hold_3' }}"
        sequence: !input button_3_hold
      - conditions: "{{ action == 'release_3' }}"
        sequence: !input button_3_release
