blueprint:
  name: Z2M - Third Reality 3 Button Remote (ZB2)
  description: >
    Handle single, double, hold, and release actions for all 3 buttons
    using Zigbee2MQTT device triggers.

  domain: automation
  input:
    remote:
      name: Remote
      description: Select your Zigbee2MQTT remote device
      selector:
        device:
          integration: mqtt

    # BUTTON 1
    button_1_single:
      name: Button 1 - Single
      default: []
      selector: { action: {} }

    button_1_double:
      name: Button 1 - Double
      default: []
      selector: { action: {} }

    button_1_hold:
      name: Button 1 - Hold
      default: []
      selector: { action: {} }

    button_1_release:
      name: Button 1 - Release
      default: []
      selector: { action: {} }

    # BUTTON 2
    button_2_single:
      name: Button 2 - Single
      default: []
      selector: { action: {} }

    button_2_double:
      name: Button 2 - Double
      default: []
      selector: { action: {} }

    button_2_hold:
      name: Button 2 - Hold
      default: []
      selector: { action: {} }

    button_2_release:
      name: Button 2 - Release
      default: []
      selector: { action: {} }

    # BUTTON 3
    button_3_single:
      name: Button 3 - Single
      default: []
      selector: { action: {} }

    button_3_double:
      name: Button 3 - Double
      default: []
      selector: { action: {} }

    button_3_hold:
      name: Button 3 - Hold
      default: []
      selector: { action: {} }

    button_3_release:
      name: Button 3 - Release
      default: []
      selector: { action: {} }

mode: queued
max: 10

trigger:
  # BUTTON 1
  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: single_1
    id: single_1

  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: double_1
    id: double_1

  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: hold_1
    id: hold_1

  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: release_1
    id: release_1

  # BUTTON 2
  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: single_2
    id: single_2

  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: double_2
    id: double_2

  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: hold_2
    id: hold_2

  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: release_2
    id: release_2

  # BUTTON 3
  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: single_3
    id: single_3

  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: double_3
    id: double_3

  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: hold_3
    id: hold_3

  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: release_3
    id: release_3

action:
  - choose:

      # BUTTON 1
      - conditions: "{{ trigger.id == 'single_1' }}"
        sequence: !input button_1_single

      - conditions: "{{ trigger.id == 'double_1' }}"
        sequence: !input button_1_double

      - conditions: "{{ trigger.id == 'hold_1' }}"
        sequence: !input button_1_hold

      - conditions: "{{ trigger.id == 'release_1' }}"
        sequence: !input button_1_release

      # BUTTON 2
      - conditions: "{{ trigger.id == 'single_2' }}"
        sequence: !input button_2_single

      - conditions: "{{ trigger.id == 'double_2' }}"
        sequence: !input button_2_double

      - conditions: "{{ trigger.id == 'hold_2' }}"
        sequence: !input button_2_hold

      - conditions: "{{ trigger.id == 'release_2' }}"
        sequence: !input button_2_release

      # BUTTON 3
      - conditions: "{{ trigger.id == 'single_3' }}"
        sequence: !input button_3_single

      - conditions: "{{ trigger.id == 'double_3' }}"
        sequence: !input button_3_double

      - conditions: "{{ trigger.id == 'hold_3' }}"
        sequence: !input button_3_hold

      - conditions: "{{ trigger.id == 'release_3' }}"
        sequence: !input button_3_release
